<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Character Counter</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="app">
      <h2 class="heading">Character Counter</h2>
      <p id="message"></p>

      <div class="count-section">
        <textarea name="text" id="text" maxlength="150" rows="15" cols="36"></textarea>

        <h2 class="first-count">Count value: Words <span id="words">0</span> Characters: <span id="char">0</span></h2>
        <h2 class="second-count">Characters left: <span id="max"> 150</span></h2> 
      </div>
    </div>
  </body>
</html>
